<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <defs>
    <linearGradient id="pin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <radialGradient id="bg" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0e2038"/>
      <stop offset="100%" stop-color="#060d18"/>
    </radialGradient>
    <clipPath id="circ">
      <circle cx="40" cy="36" r="20"/>
    </clipPath>
  </defs>

  <!-- ── Icon (scaled to 80×80, centred vertically) ── -->
  <g transform="translate(0, 0) scale(0.666)">

    <!-- Shadow -->
    <ellipse cx="50" cy="114" rx="14" ry="4" fill="#0ea5e9" opacity="0.2"/>

    <!-- Pin body -->
    <path d="M50 6 C29 6 9 26 9 47 C9 65 20 81 36 92 Q50 108 50 108 Q50 108 64 92 C80 81 91 65 91 47 C91 26 71 6 50 6 Z"
          fill="url(#pin)"/>

    <!-- Shine -->
    <path d="M31 20 C38 13 46 9 54 9 C41 11 27 23 24 39 C22 31 24 25 31 20 Z"
          fill="white" opacity="0.14"/>

    <!-- Inner circle -->
    <circle cx="50" cy="46" r="28" fill="url(#bg)"/>

    <g clip-path="url(#circ)" transform="translate(10, 10)">
      <line x1="12" y1="27" x2="68" y2="27" stroke="#162840" stroke-width="1.5"/>
      <line x1="12" y1="38" x2="68" y2="38" stroke="#162840" stroke-width="1.5"/>
      <line x1="12" y1="48" x2="68" y2="48" stroke="#162840" stroke-width="1.5"/>
      <line x1="28" y1="14" x2="28" y2="60" stroke="#162840" stroke-width="1.5"/>
      <line x1="45" y1="14" x2="45" y2="60" stroke="#162840" stroke-width="1.5"/>

      <rect x="12" y="15" width="15" height="11" fill="#0c1e33"/>
      <rect x="29" y="15" width="15" height="11" fill="#0c1e33"/>
      <rect x="46" y="15" width="22" height="11" fill="#0c1e33"/>

      <rect x="12" y="28" width="15" height="9" fill="#0c1e33"/>
      <rect x="29" y="28" width="15" height="9" fill="#22d3ee"/>
      <rect x="46" y="28" width="22" height="9" fill="#0c1e33"/>

      <rect x="12" y="39" width="9"  height="8" fill="#0c1e33"/>
      <rect x="22" y="39" width="22" height="8" fill="#0c1e33"/>
      <rect x="46" y="39" width="22" height="8" fill="#0c1e33"/>

      <rect x="12" y="49" width="15" height="12" fill="#0c1e33" opacity="0.55"/>
      <rect x="29" y="49" width="15" height="12" fill="#0c1e33" opacity="0.55"/>
      <rect x="46" y="49" width="22" height="12" fill="#0c1e33" opacity="0.55"/>

      <path d="M33 32.5 L36 35.5 L43 29"
            stroke="#04111f" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <path d="M46 98 Q50 108 54 98" stroke="white" stroke-width="1" opacity="0.18" fill="none"/>

  </g>

  <!-- ── Wordmark text ── -->
  <!-- "Zone" in white -->
  <text x="86" y="50"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="34"
        letter-spacing="-1"
        fill="white">Zone</text>

  <!-- "Proof" in teal -->
  <text x="192" y="50"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="34"
        letter-spacing="-1"
        fill="#22d3ee">Proof</text>

  <!-- Tagline -->
  <text x="88" y="65"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10"
        letter-spacing="2"
        fill="#38bdf8"
        opacity="0.6">DECENTRALIZED LAND REGISTRY</text>

</svg>
