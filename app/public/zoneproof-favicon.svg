<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <defs>
    <linearGradient id="pin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <radialGradient id="bg" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0e2038"/>
      <stop offset="100%" stop-color="#060d18"/>
    </radialGradient>
    <clipPath id="circ">
      <circle cx="50" cy="46" r="28"/>
    </clipPath>
  </defs>

  <!-- Shadow -->
  <ellipse cx="50" cy="114" rx="14" ry="4" fill="#0ea5e9" opacity="0.2"/>

  <!-- Pin body -->
  <path d="M50 6 C29 6 9 26 9 47 C9 65 20 81 36 92 Q50 108 50 108 Q50 108 64 92 C80 81 91 65 91 47 C91 26 71 6 50 6 Z"
        fill="url(#pin)"/>

  <!-- Shine highlight (top-left of pin) -->
  <path d="M31 20 C38 13 46 9 54 9 C41 11 27 23 24 39 C22 31 24 25 31 20 Z"
        fill="white" opacity="0.14"/>

  <!-- Inner circle -->
  <circle cx="50" cy="46" r="28" fill="url(#bg)"/>

  <!-- Parcel map grid, clipped to inner circle -->
  <g clip-path="url(#circ)">

    <!-- Street / lot boundary lines -->
    <line x1="22" y1="37" x2="78" y2="37" stroke="#162840" stroke-width="1.5"/>
    <line x1="22" y1="48" x2="78" y2="48" stroke="#162840" stroke-width="1.5"/>
    <line x1="22" y1="58" x2="78" y2="58" stroke="#162840" stroke-width="1.5"/>
    <line x1="38" y1="24" x2="38" y2="70" stroke="#162840" stroke-width="1.5"/>
    <line x1="55" y1="24" x2="55" y2="70" stroke="#162840" stroke-width="1.5"/>

    <!-- Row 1 parcels -->
    <rect x="22" y="25" width="15" height="11" fill="#0c1e33"/>
    <rect x="39" y="25" width="15" height="11" fill="#0c1e33"/>
    <rect x="56" y="25" width="22" height="11" fill="#0c1e33"/>

    <!-- Row 2 — centre parcel HIGHLIGHTED -->
    <rect x="22" y="38" width="15" height="9"  fill="#0c1e33"/>
    <rect x="39" y="38" width="15" height="9"  fill="#22d3ee"/>
    <rect x="56" y="38" width="22" height="9"  fill="#0c1e33"/>

    <!-- Row 3 parcels -->
    <rect x="22" y="49" width="9"  height="8"  fill="#0c1e33"/>
    <rect x="32" y="49" width="22" height="8"  fill="#0c1e33"/>
    <rect x="56" y="49" width="22" height="8"  fill="#0c1e33"/>

    <!-- Row 4 parcels (partial — circle clips bottom) -->
    <rect x="22" y="59" width="15" height="12" fill="#0c1e33" opacity="0.55"/>
    <rect x="39" y="59" width="15" height="12" fill="#0c1e33" opacity="0.55"/>
    <rect x="56" y="59" width="22" height="12" fill="#0c1e33" opacity="0.55"/>

    <!-- Checkmark on highlighted centre parcel -->
    <path d="M43 42.5 L46 45.5 L53 39"
          stroke="#04111f" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round"/>

  </g>

  <!-- Subtle tip glint -->
  <path d="M46 98 Q50 108 54 98" stroke="white" stroke-width="1" opacity="0.18" fill="none"/>

</svg>
